<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Camí de Rondiago</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23FF006E'/%3E%3Cstop offset='50%25' stop-color='%23FB5607'/%3E%3Cstop offset='100%25' stop-color='%23FFB703'/%3E%3C/linearGradient%3E%3CclipPath id='rr'%3E%3Crect width='64' height='64' rx='14'/%3E%3C/clipPath%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23bg)'/%3E%3Cg clip-path='url(%23rr)'%3E%3Cellipse cx='32' cy='72' rx='38' ry='22' fill='%230077b6' opacity='0.7'/%3E%3Cpath d='M4 46 Q16 38 28 43 Q40 48 60 40' stroke='white' stroke-width='2.5' fill='none' opacity='0.6' stroke-linecap='round'/%3E%3C/g%3E%3Ccircle cx='32' cy='16' r='6' fill='white'/%3E%3Cpath d='M32 22 L32 36' stroke='white' stroke-width='3.5' stroke-linecap='round'/%3E%3Cpath d='M32 27 L25 32' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M32 27 L39 31' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M32 36 L27 44' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M32 36 L37 44' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sun:    #FFB703;
      --coral:  #FB5607;
      --pink:   #FF006E;
      --blue:   #3A86FF;
      --mint:   #06D6A0;
      --purple: #8338EC;
      --bg:     #FFF8F0;
      --card:   #ffffff;
      --text:   #1a1a2e;
      --muted:  #7c7c9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(120deg, #FF006E 0%, #FB5607 40%, #FFB703 100%);
      color: white;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 3px 16px rgba(251,86,7,0.4);
      flex-shrink: 0;
      z-index: 200;
    }

    .header-title h1 {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.3px;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .header-title .subtitle {
      font-size: 0.68rem;
      font-weight: 600;
      opacity: 0.88;
      margin-top: 1px;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    /* Progress */
    .progress-wrap { flex: 1; min-width: 0; }
    .progress-label {
      font-size: 0.72rem;
      font-weight: 700;
      opacity: 0.95;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,0.3);
      border-radius: 99px;
      height: 12px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
    }
    .progress-bar-fill {
      background: linear-gradient(90deg, #fff 0%, #FFE566 100%);
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
      width: 0%;
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
    }

    /* ── LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── MAP ── */
    #map { flex: 1; z-index: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg);
      overflow-y: auto;
      border-right: none;
      box-shadow: 2px 0 16px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      z-index: 10;
      transition: transform 0.35s cubic-bezier(.34,1.2,.64,1);
    }

    .sidebar-header {
      padding: 12px 16px 10px;
      background: white;
      border-bottom: 2px solid #FFE0C8;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-header h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--coral), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .btn-reset {
      background: none;
      border: 1.5px solid #e0c8ff;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      font-family: inherit;
      color: var(--purple);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-reset:hover {
      background: var(--pink);
      border-color: var(--pink);
      color: white;
    }

    /* ── STAGE LIST ── */
    .stage-list { padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; }

    .stage-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      cursor: pointer;
      border-radius: 12px;
      border: 2px solid transparent;
      background: white;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stage-item:hover  {
      border-color: #FFB703;
      transform: translateX(2px);
      box-shadow: 0 3px 10px rgba(255,183,3,0.2);
    }
    .stage-item.active {
      border-color: var(--coral);
      background: #FFF3EE;
      box-shadow: 0 3px 12px rgba(251,86,7,0.18);
    }
    .stage-item.map-active {
      border-color: var(--purple);
      background: #f3eeff;
      box-shadow: 0 3px 12px rgba(124,58,237,0.22);
    }
    .stage-item.completed {
      background: #F0FFF8;
      border-color: #B7F5DB;
    }
    .stage-item.completed:hover {
      border-color: var(--mint);
      box-shadow: 0 3px 10px rgba(6,214,160,0.2);
    }

    /* Custom checkbox */
    .stage-check {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2.5px solid #d0d0e0;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
      background: white;
    }
    .stage-check:checked {
      background: linear-gradient(135deg, var(--mint), var(--blue));
      border-color: transparent;
    }
    .stage-check:checked::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .stage-info { flex: 1; min-width: 0; }
    .stage-num {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--coral);
    }
    .stage-name {
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.3;
      margin: 1px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .stage-item.completed .stage-name {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--mint);
    }
    .stage-km {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
    }
    .stage-badge {
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      transform: scale(0.5);
      flex-shrink: 0;
    }
    .stage-item.completed .stage-badge {
      opacity: 1;
      transform: scale(1);
    }

    /* ── MOBILE FLOATING BUTTON ── */
    .btn-toggle-list {
      display: none;
      position: fixed;
      bottom: 22px;
      right: 18px;
      z-index: 500;
      background: linear-gradient(135deg, var(--pink) 0%, var(--coral) 100%);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 13px 20px;
      font-size: 0.88rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,0,110,0.45);
      gap: 7px;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-toggle-list:active {
      transform: scale(0.95);
      box-shadow: 0 3px 10px rgba(255,0,110,0.3);
    }

    /* ── MOBILE BOTTOM DRAWER ── */
    @media (max-width: 640px) {
      header {
        flex-wrap: wrap;
        padding: 5px 14px 7px;
        gap: 6px;
        overflow: visible;
      }
      .header-title h1   { font-size: 1.05rem; }
      .header-title .subtitle { display: none; }
      .progress-wrap { min-width: 100%; order: 2; }

      .main { flex-direction: column; }
      #map  { flex: 1; }

      .sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%;
        height: 62dvh;
        border-right: none;
        border-top: 3px solid transparent;
        background: linear-gradient(white, white) padding-box,
                    linear-gradient(90deg, var(--pink), var(--coral), var(--sun)) border-box;
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
        box-shadow: 0 -6px 28px rgba(0,0,0,0.18);
        z-index: 400;
      }
      .sidebar.open { transform: translateY(0); }

      .sidebar-header::before {
        content: '';
        position: absolute;
        top: 7px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--pink), var(--coral));
        opacity: 0.4;
      }
      .sidebar-header {
        position: relative;
        padding-top: 20px;
        border-radius: 20px 20px 0 0;
        background: white;
      }

      .btn-toggle-list { display: flex; }

      .stage-item  { padding: 11px 12px; }
      .stage-check { width: 22px; height: 22px; }
      .stage-name  { font-size: 0.84rem; }
    }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      border-radius: 16px !important;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18) !important;
      border: 2px solid #FFE0C8;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content {
      font-family: 'Nunito', system-ui, sans-serif;
      font-size: 0.85rem;
      min-width: 180px;
      max-width: 250px;
      margin: 0 !important;
      padding: 14px 16px !important;
    }
    .leaflet-popup-tip-container { margin-top: -1px; }

    .popup-title {
      font-weight: 900;
      font-size: 0.95rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--coral), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .popup-stage {
      font-size: 0.62rem;
      font-weight: 800;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 2px;
    }
    .popup-route {
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 2px;
      line-height: 1.3;
    }
    .popup-km {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .popup-btn {
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 800;
      font-family: inherit;
      width: 100%;
      transition: opacity 0.15s, transform 0.15s;
      letter-spacing: 0.2px;
    }
    .popup-btn:hover  { opacity: 0.88; transform: scale(1.02); }
    .popup-btn.done {
      background: linear-gradient(135deg, var(--mint) 0%, var(--blue) 100%);
    }
    .popup-sep { border: none; border-top: 1.5px solid #f0e8ff; margin: 10px 0; }

    /* Popup primary button — styled button with circular checkbox icon */
    .popup-check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      width: 100%;
      padding: 9px 14px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
      transition: opacity 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .popup-check-row.done-btn {
      background: linear-gradient(135deg, var(--mint) 0%, var(--blue) 100%);
    }
    .popup-check-row:hover { opacity: 0.88; transform: scale(1.02); }
    .popup-check-box {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.18);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .popup-check-box.checked {
      background: rgba(255,255,255,0.9);
      border-color: transparent;
    }
    .popup-check-tick {
      color: var(--mint);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }
    .popup-check-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: white;
    }

    /* Partial toggle link */
    .popup-partial-toggle {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0 0;
      text-align: left;
      text-decoration: underline dotted;
      transition: color 0.15s;
    }
    .popup-partial-toggle:hover { color: var(--mint); }

    /* Popup partial section */
    .popup-partial-section { display: none; flex-direction: column; gap: 6px; margin-top: 4px; }
    .popup-partial-section.open { display: flex; }
    .popup-partial-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
    }
    .popup-partial-label strong { color: var(--mint); }
    .popup-partial-km { font-size: 0.7rem; color: var(--muted); margin-left: 4px; }
    .popup-range {
      width: 100%;
      accent-color: var(--mint);
      cursor: pointer;
    }
    .popup-btn-partial {
      background: white;
      color: var(--mint);
      border: 2px solid var(--mint);
      padding: 6px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 800;
      font-family: inherit;
      width: 100%;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }
    .popup-btn-partial:hover { background: #f0fff8; }
    .popup-btn-partial.active-partial {
      background: linear-gradient(135deg,#e0fff5,#d0f0ff);
      border-color: var(--mint);
    }

    /* Partial sidebar item */
    .stage-item.partial {
      background: #f0fff8;
      border-color: #a8f0d4;
    }
    .stage-item.partial .stage-name {
      color: var(--text);
    }
    .stage-item.partial .stage-check {
      background: repeating-linear-gradient(45deg,#06D6A0 0px,#06D6A0 4px,#e0fff5 4px,#e0fff5 8px);
      border-color: var(--mint);
    }
    .stage-item.partial .stage-badge {
      opacity: 1;
      transform: scale(1);
      color: var(--mint);
      font-size: 0.85rem;
    }

    @media (max-width: 640px) {
      .leaflet-popup-close-button {
        font-size: 22px !important;
        width: 30px !important;
        height: 30px !important;
        top: 4px !important;
        right: 4px !important;
      }
    }

    /* ── WALKING GIRL ── */
    .walker-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      align-self: flex-end;
      height: 38px;
      overflow: visible;
    }
    .walker { filter: drop-shadow(0 1px 3px rgba(0,0,0,0.22)); }

    /* Very subtle vertical shift — just 1px to simulate weight transfer, not a jump */
    @keyframes body-walk {
      0%,100% { transform: translateY(0px); }
      25%      { transform: translateY(-1px); }
      75%      { transform: translateY(-1px); }
    }
    .walker { animation: body-walk 0.75s ease-in-out infinite; }

    /* Arms: small, natural counterswing — opposite phase to legs */
    @keyframes arm-l-swing {
      0%,100% { transform: rotate(-12deg); }
      50%      { transform: rotate(12deg);  }
    }
    @keyframes arm-r-swing {
      0%,100% { transform: rotate(12deg);  }
      50%      { transform: rotate(-12deg); }
    }
    .arm-l {
      transform-box: fill-box;
      transform-origin: top center;
      animation: arm-l-swing 0.75s ease-in-out infinite;
    }
    .arm-r {
      transform-box: fill-box;
      transform-origin: top center;
      animation: arm-r-swing 0.75s ease-in-out infinite;
    }

    /* Legs: stride forward/back, offset by half a cycle from each other */
    @keyframes leg-l-swing {
      0%,100% { transform: rotate(-20deg); }
      50%      { transform: rotate(20deg);  }
    }
    @keyframes leg-r-swing {
      0%,100% { transform: rotate(20deg);  }
      50%      { transform: rotate(-20deg); }
    }
    .leg-l {
      transform-box: fill-box;
      transform-origin: top center;
      animation: leg-l-swing 0.75s ease-in-out infinite;
    }
    .leg-r {
      transform-box: fill-box;
      transform-origin: top center;
      animation: leg-r-swing 0.75s ease-in-out infinite;
    }

    @media (max-width: 640px) {
      .walker-wrap { height: 48px; padding-top: 5px; overflow: visible; }
      .walker      { width: 29px; height: 43px; }
    }

    /* ── WALKER POPUP ── */
    .walker-wrap { cursor: pointer; }

    .walker-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .walker-popup-overlay.open { display: flex; }

    .walker-popup {
      background: white;
      border-radius: 24px;
      padding: 36px 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
      max-width: 320px;
      width: 88%;
      border: 3px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(135deg, var(--pink), var(--coral), var(--sun)) border-box;
      animation: popup-in 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes popup-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .walker-popup-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      transition: color 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .walker-popup-close:hover { color: var(--pink); transform: scale(1.2); }

    .walker-popup-title {
      font-size: 1.15rem;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(90deg, var(--pink), var(--coral));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
    }

    /* ── COMPLETION BADGE ── */
    .completion-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }
    .completion-overlay.open { display: flex; }

    .completion-badge {
      background: white;
      border-radius: 28px;
      padding: 40px 36px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.3);
      position: relative;
      max-width: 340px;
      width: 88%;
      text-align: center;
      border: 3px solid transparent;
      background: linear-gradient(white,white) padding-box,
                  linear-gradient(135deg,var(--mint),var(--blue),var(--purple)) border-box;
      animation: popup-in 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    .completion-badge-emoji { font-size: 3.5rem; line-height: 1; }
    .completion-badge-title {
      font-size: 1.25rem;
      font-weight: 900;
      line-height: 1.3;
      background: linear-gradient(135deg, var(--mint), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .completion-badge-close {
      margin-top: 8px;
      background: linear-gradient(135deg, var(--mint), var(--blue));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 28px;
      font-size: 0.9rem;
      font-weight: 800;

// Close drawer when tapping the map on mobile
document.getElementById('map').addEventListener('click', () => {
  if (drawerOpen && window.innerWidth <= 640) {
    toggleSidebar();
  }
});

// ─── MAP ─────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([42.05, 3.05], 9);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ─── POLYLINES ───────────────────────────────────────────────────────────────
const polylines = [];

function stageStyle(done, partial, active) {
  if (active) {
    if (done)    return { color: '#00a37a', weight: 10, opacity: 1,    dashArray: null };
    if (partial) return { color: '#00a37a', weight:  9, opacity: 1,    dashArray: '8 5' };
                 return { color: '#5b21b6', weight:  8, opacity: 1,    dashArray: null };
  }
  if (done)    return { color: '#06D6A0', weight: 6, opacity: 0.95, dashArray: null };
  if (partial) return { color: '#06D6A0', weight: 5, opacity: 0.85, dashArray: '8 5' };
               return { color: '#a78bfa', weight: 4, opacity: 0.6,  dashArray: null };
}

function buildStagePopupContent(stage) {
  const done     = completed.has(stage.num);
  const fromName = WAYPOINTS[stage.from].name;
  const toName   = WAYPOINTS[stage.to].name;
  const partial  = partials.get(stage.num) || 0;
  const pctInit  = partial > 0 ? partial : 50;
  const kmInit   = (pctInit / 100 * stage.km).toFixed(1);

  const div = document.createElement('div');

  // Info block
  div.innerHTML =
    '<div class="popup-stage">Parte ' + stage.num + '</div>' +
    '<div class="popup-route">' + fromName + ' \u2192 ' + toName + '</div>' +
    '<div class="popup-km">' + stage.km + ' km</div>';

  // Primary CTA button
  const mainBtn = document.createElement('button');
  mainBtn.className = 'popup-check-row' + (done ? ' done-btn' : '');
  mainBtn.innerHTML =
    '<span class="popup-check-box' + (done ? ' checked' : '') + '">' +
      (done ? '<span class="popup-check-tick">\u2713</span>' : '') +
    '</span>' +
    '<span class="popup-check-label">' + (done ? 'Completada \u2014 desmarcar' : 'Marcar como completada') + '</span>';
  mainBtn.addEventListener('click', () => { toggleStage(stage.num); map.closePopup(); });
  div.appendChild(mainBtn);

  // Partial section (only for non-completed stages)
  if (!done) {
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'popup-partial-toggle';
    toggleBtn.textContent = partial > 0 ? '\u2736 Parcial: ' + partial + '% \u2014 editar' : '+ Marcar % completada';

    const section = document.createElement('div');
    section.className = 'popup-partial-section' + (partial > 0 ? ' open' : '');
    section.innerHTML =
      '<div class="popup-partial-label">Porcentaje: ' +
        '<strong id="pct-val">' + pctInit + '%</strong>' +
        '<span class="popup-partial-km" id="pct-km"> (' + kmInit + ' km)</span>' +
      '</div>' +
      '<input type="range" class="popup-range" id="pct-range" min="10" max="90" step="10" value="' + pctInit + '" />' +
      '<button class="popup-btn-partial' + (partial > 0 ? ' active-partial' : '') + '" id="pct-save">' +
        (partial > 0 ? '\u2736 Actualizar (' + partial + '%)' : '\u2736 Marcar parcialmente') +
      '</button>';

    toggleBtn.addEventListener('click', () => section.classList.toggle('open'));

    const rangeEl = section.querySelector('#pct-range');
    const valEl   = section.querySelector('#pct-val');
    const kmEl    = section.querySelector('#pct-km');
    rangeEl.addEventListener('input', () => {
      valEl.textContent = rangeEl.value + '%';
      kmEl.textContent  = ' (' + (rangeEl.value / 100 * stage.km).toFixed(1) + ' km)';
    });
    section.querySelector('#pct-save').addEventListener('click', () => {
      setPartial(stage.num, +rangeEl.value);
      map.closePopup();
    });

    div.appendChild(toggleBtn);
    div.appendChild(section);
  }

  return div;
}

function makePolyline(stage, idx) {
  const from  = WAYPOINTS[stage.from];
  const to    = WAYPOINTS[stage.to];
  const done  = completed.has(stage.num);
  const via   = stage.via || [];
  const coords = [[from.lat, from.lng], ...via, [to.lat, to.lng]];

  // Invisible fat line for easy touch/click targeting
  const hitLine = L.polyline(coords, { color: 'transparent', weight: 20, opacity: 0 }).addTo(map);

  const partial = partials.get(stage.num) || 0;
  const line = L.polyline(coords, stageStyle(done, partial)).addTo(map);

  // Click on visible line or hit area → popup at midpoint
  function onLineClick(e) {
    setActiveStage(stage.num);
    L.popup({ maxWidth: 260, className: 'stage-popup' })
      .setLatLng(e.latlng)
      .setContent(buildStagePopupContent(stage))
      .openOn(map);
  }

  line.on('click', onLineClick);
  hitLine.on('click', onLineClick);

  return { line, hitLine };
}

STAGES.forEach((stage, i) => polylines.push(makePolyline(stage, i)));
map.on('popupclose', () => setActiveStage(null));

// ─── MARKERS ─────────────────────────────────────────────────────────────────
function makeMarkerIcon(done, isKey, partial) {
  const size = 10;
  const half = size / 2;
  let bg;
  if (done)         bg = '#22c55e';
  else if (partial) bg = 'repeating-linear-gradient(45deg,#06D6A0 0px,#06D6A0 3px,#b8f5e6 3px,#b8f5e6 6px)';
  else              bg = '#c4b5fd';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${bg};
      border:2px solid white;
      box-shadow:0 1px 4px rgba(0,0,0,0.45);
    "></div>`,
    iconAnchor: [half, half],
    iconSize:   [size, size],
  });
}

// Key waypoints (original 23-stage nodes) shown larger
const KEY_WAYPOINT_INDICES = new Set(WAYPOINTS.map((_, i) => i));

const markers = [];

function makeMarker(wpIdx) {
  const wp    = WAYPOINTS[wpIdx];
  const isKey = KEY_WAYPOINT_INDICES.has(wpIdx);
  const isDone = STAGES.some(s => s.to === wpIdx && completed.has(s.num));
  const m = L.marker([wp.lat, wp.lng], {
    icon: makeMarkerIcon(isDone, isKey),
    title: wp.name,
    zIndexOffset: isKey ? 100 : 0,
  });

  // Markers only show the place name — toggling is done via the route lines
  m.bindPopup(`<div class="popup-title">${wp.name}</div>`, { maxWidth: 200 });

  return m.addTo(map);
}

WAYPOINTS.forEach((_, i) => markers.push(makeMarker(i)));

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
let activeItem     = null;
let activeStageNum = null;

function setActiveStage(num) {
  // Deactivate previous
  if (activeStageNum !== null) {
    const idx  = STAGES.findIndex(s => s.num === activeStageNum);
    if (idx >= 0) {
      const done    = completed.has(activeStageNum);
      const partial = partials.get(activeStageNum) || 0;
      polylines[idx].line.setStyle(stageStyle(done, partial, false));
    }
    document.querySelectorAll('.stage-item.map-active').forEach(el => el.classList.remove('map-active'));
  }
  activeStageNum = num;
  if (num === null) return;
  // Activate new
  const idx = STAGES.findIndex(s => s.num === num);
  if (idx >= 0) {
    const done    = completed.has(num);
    const partial = partials.get(num) || 0;
    polylines[idx].line.setStyle(stageStyle(done, partial, true));
  }
  // Highlight sidebar item
  const sidebarItem = document.querySelector(`.stage-item[data-stage="${num}"]`);
  if (sidebarItem) sidebarItem.classList.add('map-active');
}

function buildSidebar() {
  const list = document.getElementById('stage-list');
  list.innerHTML = '';

  STAGES.forEach(stage => {
    const from = WAYPOINTS[stage.from];
    const to   = WAYPOINTS[stage.to];
    const done = completed.has(stage.num);

    const partial = partials.get(stage.num) || 0;
    const item = document.createElement('div');
    item.className = `stage-item${done ? ' completed' : partial ? ' partial' : ''}`;
    item.dataset.stage = stage.num;
    item.innerHTML = `
      <input type="checkbox" class="stage-check" ${done ? 'checked' : ''} data-stage="${stage.num}" />
      <div class="stage-info">
        <div class="stage-num">Parte ${stage.num}</div>
        <div class="stage-name">${from.name} → ${to.name}</div>
        <div class="stage-km">${done ? stage.km + ' km' : partial ? `${(partial/100*stage.km).toFixed(1)} / ${stage.km} km (${partial}%)` : stage.km + ' km'}</div>
      </div>
      <span class="stage-badge">${partial && !done ? '✦' : ''}</span>
    `;

    item.querySelector('.stage-check').addEventListener('change', e => {
      e.stopPropagation();
      toggleStage(stage.num);
    });

    item.addEventListener('click', e => {
      if (e.target.classList.contains('stage-check')) return;
      zoomToStage(stage, item);
      // On mobile, close drawer after selecting
      if (window.innerWidth <= 640 && drawerOpen) toggleSidebar();
    });

    list.appendChild(item);
  });
}

function zoomToStage(stage, item) {
  if (activeItem) activeItem.classList.remove('active');
  item.classList.add('active');
  activeItem = item;
  setActiveStage(stage.num);
  const from   = WAYPOINTS[stage.from];
  const to     = WAYPOINTS[stage.to];
  const bounds = L.latLngBounds([[from.lat, from.lng], [to.lat, to.lng]]);
  map.fitBounds(bounds, { padding: [70, 70], maxZoom: 14 });
}

// ─── TOGGLE & UPDATE ─────────────────────────────────────────────────────────
function toggleStage(num) {
  if (completed.has(num)) {
    completed.delete(num);
  } else {
    completed.add(num);
    partials.delete(num);
    launchConfetti();
  }
  saveState();
  refresh();
}

function refresh() {
  // Polylines
  STAGES.forEach((stage, i) => {
    const done    = completed.has(stage.num);
    const partial = partials.get(stage.num) || 0;
    polylines[i].line.setStyle(stageStyle(done, partial, stage.num === activeStageNum));
  });

  // Markers
  WAYPOINTS.forEach((_, i) => {
    const isKey    = KEY_WAYPOINT_INDICES.has(i);
    const isDone   = STAGES.some(s => (s.to === i || s.from === i) && completed.has(s.num));
    const isPartial = !isDone && STAGES.some(s => (s.to === i || s.from === i) && partials.has(s.num));
    markers[i].setIcon(makeMarkerIcon(isDone, isKey, isPartial));
  });

  // Sidebar items
  buildSidebar();

  // Progress bar
  const doneKm = STAGES.reduce((a, s) => {
    if (completed.has(s.num)) return a + s.km;
    const p = partials.get(s.num);
    if (p) return a + (p / 100 * s.km);
    return a;
  }, 0);
  const pct = TOTAL_KM > 0 ? (doneKm / TOTAL_KM * 100) : 0;
  document.getElementById('prog-pct').textContent = pct.toFixed(1) + '%';
  document.getElementById('prog-km').textContent  = `${doneKm.toFixed(1)} / ${TOTAL_KM.toFixed(1)} km`;
  document.getElementById('prog-bar').style.width = pct + '%';

  // Show completion badge if all stages are fully done
  if (completed.size === STAGES.length) {
    setTimeout(showCompletionBadge, 400);
  }
}

function resetAll() {
  if (!confirm('¿Seguro que quieres reiniciar todo el progreso?')) return;
  completed.clear();
  partials.clear();
  saveState();
  refresh();
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  Object.assign(canvas.style, {
    position: 'fixed', top: 0, left: 0, width: '100%', height: '100%',
    pointerEvents: 'none', zIndex: 9999, display: 'none'
  });
  document.body.appendChild(canvas);

  const COLORS = ['#FF006E','#FB5607','#FFB703','#06D6A0','#3A86FF','#8338EC','#fff'];
  let particles = [], raf = null;

  function rand(a, b) { return Math.random() * (b - a) + a; }

  function spawn() {
    const count = 140;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: rand(0, canvas.width),
        y: rand(-canvas.height * 0.2, 0),
        r: rand(5, 11),
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: rand(-2.5, 2.5),
        vy: rand(3, 8),
        rot: rand(0, Math.PI * 2),
        vrot: rand(-0.15, 0.15),
        shape: Math.random() > 0.5 ? 'rect' : 'circle',
        w: rand(7, 14),
        h: rand(4, 8),
        alpha: 1,
      });
    }
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.r, p.r * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += 0.15;
      p.rot += p.vrot;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.03;
    });
    particles = particles.filter(p => p.alpha > 0);
    if (particles.length > 0) {
      raf = requestAnimationFrame(draw);
    } else {
      canvas.style.display = 'none';
    }
  }

  window.launchConfetti = function(duration) {
    duration = duration || 1000;
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    particles = [];
    if (raf) cancelAnimationFrame(raf);
    spawn();
    raf = requestAnimationFrame(draw);
    // Keep re-spawning for big bursts
    let elapsed = 0;
    const interval = 400;
    const spawnTimer = setInterval(() => {
      elapsed += interval;
      if (elapsed < duration) { spawn(); }
      else { clearInterval(spawnTimer); setTimeout(() => { particles = particles.slice(0, 30); }, 500); }
    }, interval);
  };
})();

// ─── COMPLETION BADGE ────────────────────────────────────────────────────────
(function() {
  const overlay = document.getElementById('completion-overlay');
  document.getElementById('completion-close').addEventListener('click', () => {
    overlay.classList.remove('open');
  });
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
  window.showCompletionBadge = function() {
    overlay.classList.add('open');
    launchConfetti(3000);
  };
})();

// ─── WALKER POPUP ────────────────────────────────────────────────────────────
(function() {
  const overlay = document.getElementById('walker-popup-overlay');
  const closeBtn = document.getElementById('walker-popup-close');
  document.querySelector('.walker-wrap').addEventListener('click', () => {
    overlay.classList.add('open');
  });
  closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
})();

// ─── INIT ────────────────────────────────────────────────────────────────────
buildSidebar();
refresh();
</script>
</body>
