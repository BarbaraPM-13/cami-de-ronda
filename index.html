<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Camino de Ronda</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%231B4332'/%3E%3Cstop offset='50%25' stop-color='%232D6A4F'/%3E%3Cstop offset='100%25' stop-color='%2340916C'/%3E%3C/linearGradient%3E%3CclipPath id='rr'%3E%3Crect width='64' height='64' rx='14'/%3E%3C/clipPath%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23bg)'/%3E%3Cg clip-path='url(%23rr)'%3E%3Cellipse cx='32' cy='72' rx='38' ry='22' fill='%230077b6' opacity='0.7'/%3E%3Cpath d='M4 46 Q16 38 28 43 Q40 48 60 40' stroke='white' stroke-width='2.5' fill='none' opacity='0.6' stroke-linecap='round'/%3E%3C/g%3E%3Ccircle cx='32' cy='16' r='6' fill='white'/%3E%3Cpath d='M32 22 L32 36' stroke='white' stroke-width='3.5' stroke-linecap='round'/%3E%3Cpath d='M32 27 L25 32' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M32 27 L39 31' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M32 36 L27 44' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M32 36 L37 44' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sun:    #52B788;
      --coral:  #40916C;
      --pink:   #1B4332;
      --blue:   #2D6A4F;
      --mint:   #74C69D;
      --purple: #40916C;
      --bg:     #F0F7F4;
      --card:   #ffffff;
      --text:   #1B2E24;
      --muted:  #6B8F71;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(120deg, #40916C 0%, #2D6A4F 50%, #1B4332 100%);
      color: white;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 3px 16px rgba(27,67,50,0.35);
      flex-shrink: 0;
      z-index: 200;
    }

    .header-title h1 {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.3px;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .header-title .subtitle {
      font-size: 0.68rem;
      font-weight: 600;
      opacity: 0.88;
      margin-top: 1px;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    /* Progress */
    .progress-wrap { flex: 1; min-width: 0; }
    .progress-label {
      font-size: 0.72rem;
      font-weight: 700;
      opacity: 0.95;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,0.3);
      border-radius: 99px;
      height: 12px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
    }
    .progress-bar-fill {
      background: linear-gradient(90deg, #fff 0%, #FFE566 100%);
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
      width: 0%;
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
    }

    /* ── LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── MAP ── */
    #map { flex: 1; z-index: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg);
      overflow-y: auto;
      border-right: none;
      box-shadow: 2px 0 16px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      z-index: 10;
      transition: transform 0.35s cubic-bezier(.34,1.2,.64,1);
    }

    .sidebar-header {
      padding: 12px 16px 10px;
      background: white;
      border-bottom: 2px solid #FFE0C8;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-header h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--coral), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .btn-reset {
      background: none;
      border: 1.5px solid #74C69D;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      font-family: inherit;
      color: var(--purple);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-reset:hover {
      background: var(--pink);
      border-color: var(--pink);
      color: white;
    }

    /* ── STAGE LIST ── */
    .stage-list { padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; }

    .stage-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      cursor: pointer;
      border-radius: 12px;
      border: 2px solid transparent;
      background: white;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stage-item:hover  {
      border-color: #FFB703;
      transform: translateX(2px);
      box-shadow: 0 3px 10px rgba(255,183,3,0.2);
    }
    .stage-item.active {
      border-color: var(--coral);
      background: #FFF3EE;
      box-shadow: 0 3px 12px rgba(251,86,7,0.18);
    }
    .stage-item.map-active {
      border-color: var(--purple);
      background: #f3eeff;
      box-shadow: 0 3px 12px rgba(124,58,237,0.22);
    }
    .stage-item.completed {
      background: #F0FFF8;
      border-color: #B7F5DB;
    }
    .stage-item.completed:hover {
      border-color: var(--mint);
      box-shadow: 0 3px 10px rgba(6,214,160,0.2);
    }

    /* Custom checkbox */
    .stage-check-visual {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2.5px solid #d0d0e0;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      background: white;
    }
    .stage-check-visual.checked {
      background: var(--coral);
      border-color: transparent;
    }
    .stage-check-visual.checked::after {
      content: '✓';
      color: white;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .stage-info { flex: 1; min-width: 0; }
    .stage-num {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--coral);
    }
    .stage-name {
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.3;
      margin: 1px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .stage-item.completed .stage-name {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--mint);
    }
    .stage-km {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
    }
    .stage-badge {
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      transform: scale(0.5);
      flex-shrink: 0;
    }
    .stage-item.completed .stage-badge {
      opacity: 1;
      transform: scale(1);
    }

    /* ── MOBILE FLOATING BUTTON ── */
    .btn-toggle-list {
      display: none;
      position: fixed;
      bottom: 22px;
      right: 18px;
      z-index: 500;
      background: linear-gradient(135deg, var(--pink) 0%, var(--coral) 100%);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 13px 20px;
      font-size: 0.88rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,0,110,0.45);
      gap: 7px;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-toggle-list:active {
      transform: scale(0.95);
      box-shadow: 0 3px 10px rgba(255,0,110,0.3);
    }

    /* ── MOBILE BOTTOM DRAWER ── */
    @media (max-width: 640px) {
      header {
        flex-wrap: wrap;
        padding: 5px 14px 7px;
        gap: 6px;
        overflow: visible;
      }
      .header-title h1   { font-size: 1.05rem; }
      .header-title .subtitle { display: none; }
      .progress-wrap { min-width: 100%; order: 2; }

      .main { flex-direction: column; }
      #map  { flex: 1; }

      .sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%;
        height: 62dvh;
        border-right: none;
        border-top: 3px solid transparent;
        background: linear-gradient(white, white) padding-box,
                    linear-gradient(90deg, var(--pink), var(--coral), var(--sun)) border-box;
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
        box-shadow: 0 -6px 28px rgba(0,0,0,0.18);
        z-index: 400;
      }
      .sidebar.open { transform: translateY(0); }

      .sidebar-header::before {
        content: '';
        position: absolute;
        top: 7px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--pink), var(--coral));
        opacity: 0.4;
      }
      .sidebar-header {
        position: relative;
        padding-top: 20px;
        border-radius: 20px 20px 0 0;
        background: white;
      }

      .btn-toggle-list { display: flex; }

      .stage-item  { padding: 11px 12px; }
      .stage-check-visual { width: 22px; height: 22px; }
      .stage-name  { font-size: 0.84rem; }
    }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      border-radius: 16px !important;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18) !important;
      border: 2px solid #FFE0C8;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.85rem;
      min-width: 180px;
      max-width: 250px;
      margin: 0 !important;
      padding: 14px 16px !important;
    }
    .leaflet-popup-tip-container { margin-top: -1px; }

    .popup-title {
      font-weight: 900;
      font-size: 0.95rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--coral), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .popup-stage {
      font-size: 0.62rem;
      font-weight: 800;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 2px;
    }
    .popup-route {
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 2px;
      line-height: 1.3;
    }
    .popup-km {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .popup-btn {
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 800;
      font-family: inherit;
      width: 100%;
      transition: opacity 0.15s, transform 0.15s;
      letter-spacing: 0.2px;
    }
    .popup-btn:hover  { opacity: 0.88; transform: scale(1.02); }
    .popup-btn.done {
      background: linear-gradient(135deg, var(--mint) 0%, var(--blue) 100%);
    }
    .popup-sep { border: none; border-top: 1.5px solid #f0e8ff; margin: 10px 0; }

    /* Popup primary button — styled button with circular checkbox icon */
    .popup-check-row {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      width: 100%;
      padding: 9px 14px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
      transition: opacity 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .popup-check-row .popup-check-box {
      position: absolute;
      left: 12px;
    }
    .popup-check-row.done-btn {
      background: linear-gradient(135deg, var(--mint) 0%, var(--blue) 100%);
    }
    .popup-check-row:hover { opacity: 0.88; transform: scale(1.02); }
    .popup-check-box {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.18);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .popup-check-box.checked {
      background: rgba(255,255,255,0.9);
      border-color: transparent;
    }
    .popup-check-tick {
      color: var(--mint);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }
    .popup-check-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: white;
    }

    /* Partial toggle link */
    .popup-partial-toggle {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0 0;
      text-align: left;
      text-decoration: underline dotted;
      transition: color 0.15s;
    }
    .popup-partial-toggle:hover { color: var(--mint); }

    /* Popup partial section */
    .popup-partial-section { display: none; flex-direction: column; gap: 6px; margin-top: 4px; }
    .popup-partial-section.open { display: flex; }
    .popup-partial-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
    }
    .popup-partial-label strong { color: var(--mint); }
    .popup-partial-km { font-size: 0.7rem; color: var(--muted); margin-left: 4px; }
    .popup-range {
      width: 100%;
      accent-color: var(--mint);
      cursor: pointer;
    }
    .popup-btn-partial {
      background: white;
      color: var(--mint);
      border: 2px solid var(--mint);
      padding: 6px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 800;
      font-family: inherit;
      width: 100%;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }
    .popup-btn-partial:hover { background: #f0fff8; }
    .popup-btn-partial.active-partial {
      background: linear-gradient(135deg,#e0fff5,#d0f0ff);
      border-color: var(--mint);
    }

    /* Partial sidebar item */
    .stage-item.partial {
      background: #f0fff8;
      border-color: #a8f0d4;
    }
    .stage-item.partial .stage-name {
      color: var(--text);
    }
    .stage-item.partial .stage-check-visual {
      background: repeating-linear-gradient(45deg,#52B788 0px,#52B788 4px,#d8f3e8 4px,#d8f3e8 8px) !important;
      border-color: var(--mint) !important;
    }
    .stage-item.partial .stage-badge {
      opacity: 1;
      transform: scale(1);
      color: var(--mint);
      font-size: 0.85rem;
    }

    @media (max-width: 640px) {
      .leaflet-popup-close-button {
        font-size: 22px !important;
        width: 30px !important;
        height: 30px !important;
        top: 4px !important;
        right: 4px !important;
      }
    }

    /* ── BOOT EMOJI ── */
    .boot-emoji {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      align-self: center;
      font-size: 36px;
      line-height: 1;
    }

    /* ── COMPLETION BADGE ── */
    .completion-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }
    .completion-overlay.open { display: flex; }

    .completion-badge {
      background: white;
      border-radius: 28px;
      padding: 40px 36px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.3);
      position: relative;
      max-width: 340px;
      width: 88%;
      text-align: center;
      border: 3px solid transparent;
      background: linear-gradient(white,white) padding-box,
                  linear-gradient(135deg,var(--mint),var(--blue),var(--purple)) border-box;
      animation: popup-in 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    .completion-badge-emoji { font-size: 3.5rem; line-height: 1; }
    .completion-badge-title {
      font-size: 1.25rem;
      font-weight: 900;
      line-height: 1.3;
      background: linear-gradient(135deg, var(--mint), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .completion-badge-close {
      margin-top: 8px;
      background: linear-gradient(135deg, var(--mint), var(--blue));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 28px;
      font-size: 0.9rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .completion-badge-close:hover { opacity: 0.88; transform: scale(1.03); }

    /* ── LANGUAGE SWITCHER ── */
    .lang-switcher {
      display: flex;
      gap: 4px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .lang-btn {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.35);
      color: white;
      border-radius: 8px;
      padding: 3px 9px;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      letter-spacing: 0.5px;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.25); }
    .lang-btn.active {
      background: rgba(255,255,255,0.9);
      color: var(--coral);
      border-color: transparent;
    }

  </style>
</head>
<body>

<header>
  <!-- Boot emoji replacing the walker animation -->
  <span class="boot-emoji" aria-hidden="true">🥾</span>

  <div class="header-title">
    <h1 data-i18n="header.title">Camino de Ronda</h1>
    <div class="subtitle">Portbou → Blanes</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-pct">0%</span>
      <span id="prog-km">0 / 202.2 km</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-bar"></div>
    </div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn" id="lang-es" onclick="setLang('es')">ES</button>
    <button class="lang-btn" id="lang-ca" onclick="setLang('ca')">CA</button>
  </div>
</header>

<!-- Completion badge -->
<div class="completion-overlay" id="completion-overlay">
  <div class="completion-badge">
    <div class="completion-badge-emoji">🏅</div>
    <div class="completion-badge-title" data-i18n="completion.title">Has completado el Camino de Ronda, ¡enhorabuena!</div>
    <button class="completion-badge-close" id="completion-close" data-i18n="completion.button">¡Genial! 🎉</button>
  </div>
</div>



<div class="main">
  <div id="map"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 data-i18n="sidebar.title">Partes</h2>
      <button class="btn-reset" onclick="resetAll()" data-i18n="sidebar.reset">Reiniciar progreso</button>
    </div>
    <div class="stage-list" id="stage-list"></div>
  </div>
</div>

<!-- Mobile floating button -->
<button class="btn-toggle-list" id="btn-toggle" onclick="toggleSidebar()">
  📋 <span id="btn-label" data-i18n="mobile.stages">Ver etapas</span>
</button>

function applyTranslations() {
  // Update all elements with data-i18n attribute
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Keep the mobile button label in sync with drawer state

  // Highlight active language button

  document.getElementById('lang-ca').classList.toggle('active', currentLang === 'ca');
  // Re-render the sidebar so dynamic strings (Parte/Tram) update too
  if (typeof buildSidebar === 'function') buildSidebar();
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);

// ─── STATE ───────────────────────────────────────────────────────────────────

let partials  = new Map(Object.entries(JSON.parse(localStorage.getItem(PARTIAL_KEY) || '{}')).map(([k,v])=>[+k,v]));

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed]));
  localStorage.setItem(PARTIAL_KEY, JSON.stringify(Object.fromEntries(partials)));
  trackProgress();
}

// ─── ANALYTICS ───────────────────────────────────────────────────────────────
(function() {
  // Persistent anonymous ID — one per device/browser, never changes
  const ID_KEY = 'cami-ronda-uid';
  let uid = localStorage.getItem(ID_KEY);
  if (!uid) {
    uid = 'u-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
    localStorage.setItem(ID_KEY, uid);
  }
  mixpanel.identify(uid);
})();

function trackProgress() {
  const doneKm = STAGES.reduce((a, s) => {
    if (completed.has(s.num)) return a + s.km;
    const p = partials.get(s.num);
    if (p) return a + (p / 100 * s.km);
    return a;
  }, 0);
  const pct            = Math.round((doneKm / TOTAL_KM) * 1000) / 10; // one decimal
  const stagesComplete = completed.size;
  const stagesPartial  = partials.size;

  // People.set OVERWRITES — always reflects the user's latest state.
  // This is what lets Mixpanel compute "average completion across all users".
  mixpanel.people.set({
    completion_pct:    pct,
    km_done:           Math.round(doneKm * 10) / 10,
    stages_completed:  stagesComplete,
    stages_partial:    stagesPartial,
    last_active:       new Date().toISOString(),
  });

  // One event per save — useful for a timeline but not for averages.
  mixpanel.track('progress_updated', {
    completion_pct:   pct,
    km_done:          Math.round(doneKm * 10) / 10,
    stages_completed: stagesComplete,
  });
}

function setPartial(num, pct) {
  partials.set(num, pct);
  saveState();
  refresh();
  launchConfetti();
}

function stageStyle(done, partial, active) {
  if (active) {
    if (done)    return { color: '#1B4332', weight: 10, opacity: 1,    dashArray: null };
    if (partial) return { color: '#1B4332', weight:  9, opacity: 1,    dashArray: '8 5' };
                 return { color: '#1B4332', weight:  8, opacity: 1,    dashArray: null };
  }
  if (done)    return { color: '#52B788', weight: 6, opacity: 0.95, dashArray: null };
  if (partial) return { color: '#52B788', weight: 5, opacity: 0.85, dashArray: '8 5' };
               return { color: '#A8B8A8', weight: 4, opacity: 0.55, dashArray: null };
}

function buildStagePopupContent(stage) {
  const done     = completed.has(stage.num);
  const fromName = WAYPOINTS[stage.from].name;
  const toName   = WAYPOINTS[stage.to].name;
  const partial  = partials.get(stage.num) || 0;
  const pctInit  = partial > 0 ? partial : 50;
  const kmInit   = (pctInit / 100 * stage.km).toFixed(1);

  const div = document.createElement('div');

  // Info block
  div.innerHTML =
    '<div class="popup-stage">' + t('popup.stage') + ' ' + stage.num + '</div>' +
    '<div class="popup-route">' + fromName + ' \u2192 ' + toName + '</div>' +
    '<div class="popup-km">' + stage.km + ' km</div>';

  // Primary CTA button
  const mainBtn = document.createElement('button');
  mainBtn.className = 'popup-check-row' + (done ? ' done-btn' : '');
  mainBtn.innerHTML =
    '<span class="popup-check-box' + (done ? ' checked' : '') + '">' +
      (done ? '<span class="popup-check-tick">\u2713</span>' : '') +
    '</span>' +
    '<span class="popup-check-label">' + (done ? t('popup.uncheck') : t('popup.check')) + '</span>';
  mainBtn.addEventListener('click', () => { toggleStage(stage.num); map.closePopup(); });
  div.appendChild(mainBtn);

  // Partial section (only for non-completed stages)
  if (!done) {
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'popup-partial-toggle';
    toggleBtn.textContent = partial > 0 ? '\u2736 ' + t('popup.partialEdit') + ' ' + partial + '%' : '+ ' + t('popup.partialAdd');

    const section = document.createElement('div');
    section.className = 'popup-partial-section' + (partial > 0 ? ' open' : '');
    section.innerHTML =
      '<div class="popup-partial-label">' + t('popup.percentage') + ' ' +
        '<strong id="pct-val">' + pctInit + '%</strong>' +
        '<span class="popup-partial-km" id="pct-km"> (' + kmInit + ' km)</span>' +
      '</div>' +
      '<input type="range" class="popup-range" id="pct-range" min="10" max="90" step="10" value="' + pctInit + '" />' +
      '<button class="popup-btn-partial' + (partial > 0 ? ' active-partial' : '') + '" id="pct-save">' +
        (partial > 0 ? '\u2736 ' + t('popup.partialUpdate') + ' (' + partial + '%)' : '\u2736 ' + t('popup.partialSave')) +
      '</button>';

    toggleBtn.addEventListener('click', () => section.classList.toggle('open'));

    const rangeEl = section.querySelector('#pct-range');
    const valEl   = section.querySelector('#pct-val');
    const kmEl    = section.querySelector('#pct-km');
    rangeEl.addEventListener('input', () => {
      valEl.textContent = rangeEl.value + '%';
      kmEl.textContent  = ' (' + (rangeEl.value / 100 * stage.km).toFixed(1) + ' km)';
    });
    section.querySelector('#pct-save').addEventListener('click', () => {
      setPartial(stage.num, +rangeEl.value);
      map.closePopup();
    });

    div.appendChild(toggleBtn);
    div.appendChild(section);
  }

  return div;
}

function makePolyline(stage, idx) {
  const from  = WAYPOINTS[stage.from];
  const to    = WAYPOINTS[stage.to];
  const done  = completed.has(stage.num);
  const via   = stage.via || [];
  const coords = [[from.lat, from.lng], ...via, [to.lat, to.lng]];

  // Invisible fat line for easy touch/click targeting
  const hitLine = L.polyline(coords, { color: 'transparent', weight: 20, opacity: 0 }).addTo(map);

  const partial = partials.get(stage.num) || 0;
  const line = L.polyline(coords, stageStyle(done, partial)).addTo(map);

  // Click on visible line or hit area → popup at midpoint
  function onLineClick(e) {
    setActiveStage(stage.num);
    L.popup({ maxWidth: 260, className: 'stage-popup' })
      .setLatLng(e.latlng)
      .setContent(buildStagePopupContent(stage))
      .openOn(map);
  }

  line.on('click', onLineClick);
  hitLine.on('click', onLineClick);

  return { line, hitLine };
}

STAGES.forEach((stage, i) => polylines.push(makePolyline(stage, i)));
map.on('popupclose', () => setActiveStage(null));

// ─── MARKERS ─────────────────────────────────────────────────────────────────
function makeMarkerIcon(done, isKey, partial) {
  const size = 10;
  const half = size / 2;
  let bg;
  if (done)         bg = '#22c55e';
  else if (partial) bg = 'repeating-linear-gradient(45deg,#52B788 0px,#52B788 3px,#d8f3e8 3px,#d8f3e8 6px)';
  else              bg = '#c4b5fd';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${bg};
      border:2px solid white;
      box-shadow:0 1px 4px rgba(0,0,0,0.45);
    "></div>`,
    iconAnchor: [half, half],
    iconSize:   [size, size],
  });
}

// Key waypoints (original 23-stage nodes) shown larger
const KEY_WAYPOINT_INDICES = new Set(WAYPOINTS.map((_, i) => i));

const markers = [];

function makeMarker(wpIdx) {
  const wp    = WAYPOINTS[wpIdx];
  const isKey = KEY_WAYPOINT_INDICES.has(wpIdx);
  const isDone = STAGES.some(s => s.to === wpIdx && completed.has(s.num));
  const m = L.marker([wp.lat, wp.lng], {
    icon: makeMarkerIcon(isDone, isKey),
    title: wp.name,
    zIndexOffset: isKey ? 100 : 0,
  });

  // Markers only show the place name — toggling is done via the route lines
  m.bindPopup(`<div class="popup-title">${wp.name}</div>`, { maxWidth: 200 });

  return m.addTo(map);
}

WAYPOINTS.forEach((_, i) => markers.push(makeMarker(i)));

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
let activeItem     = null;
let activeStageNum = null;

function setActiveStage(num) {
  // Deactivate previous
  if (activeStageNum !== null) {
    const idx  = STAGES.findIndex(s => s.num === activeStageNum);
    if (idx >= 0) {
      const done    = completed.has(activeStageNum);
      const partial = partials.get(activeStageNum) || 0;
      polylines[idx].line.setStyle(stageStyle(done, partial, false));
    }
    document.querySelectorAll('.stage-item.map-active').forEach(el => el.classList.remove('map-active'));
  }
  activeStageNum = num;
  if (num === null) return;
  // Activate new
  const idx = STAGES.findIndex(s => s.num === num);
  if (idx >= 0) {
    const done    = completed.has(num);
    const partial = partials.get(num) || 0;
    polylines[idx].line.setStyle(stageStyle(done, partial, true));
  }
  // Highlight sidebar item
  const sidebarItem = document.querySelector(`.stage-item[data-stage="${num}"]`);
  if (sidebarItem) sidebarItem.classList.add('map-active');

}

function buildSidebar() {
  const list = document.getElementById('stage-list');
  list.innerHTML = '';

  STAGES.forEach(stage => {
    const from = WAYPOINTS[stage.from];
    const to   = WAYPOINTS[stage.to];
    const done = completed.has(stage.num);

    const partial = partials.get(stage.num) || 0;
    const item = document.createElement('div');
    item.className = `stage-item${done ? ' completed' : partial ? ' partial' : ''}`;
    item.dataset.stage = stage.num;
    item.innerHTML = `
      <span class="stage-check-visual${done ? ' checked' : ''}"></span>
      <div class="stage-info">
        <div class="stage-num">${t('sidebar.stage')} ${stage.num}</div>
        <div class="stage-name">${from.name} → ${to.name}</div>
        <div class="stage-km">${done ? stage.km + ' km' : partial ? `${(partial/100*stage.km).toFixed(1)} / ${stage.km} km (${partial}%)` : stage.km + ' km'}</div>
      </div>
      <span class="stage-badge">${partial && !done ? '✦' : ''}</span>
    `;

    const checkVisual = item.querySelector('.stage-check-visual');

    checkVisual.addEventListener('click', e => {
      e.stopPropagation();
      toggleStage(stage.num);
    });

    item.addEventListener('click', e => {
      if (e.target === checkVisual) return;
      zoomToStage(stage, item);
      if (window.innerWidth <= 640 && drawerOpen) toggleSidebar();
    });

    list.appendChild(item);
  });
}

function zoomToStage(stage, item) {
  if (activeItem) activeItem.classList.remove('active');
  item.classList.add('active');
  activeItem = item;
  setActiveStage(stage.num);
  const from   = WAYPOINTS[stage.from];
  const to     = WAYPOINTS[stage.to];
  const bounds = L.latLngBounds([[from.lat, from.lng], [to.lat, to.lng]]);
  map.fitBounds(bounds, { padding: [70, 70], maxZoom: 14 });
}

// ─── TOGGLE & UPDATE ─────────────────────────────────────────────────────────
function toggleStage(num) {
  if (completed.has(num)) {
    completed.delete(num);
  } else {
    completed.add(num);
    partials.delete(num);
    launchConfetti();
  }
  saveState();
  refresh();
}

function refresh() {
  // Polylines
  STAGES.forEach((stage, i) => {
    const done    = completed.has(stage.num);
    const partial = partials.get(stage.num) || 0;
    polylines[i].line.setStyle(stageStyle(done, partial, stage.num === activeStageNum));
  });

  // Markers
  WAYPOINTS.forEach((_, i) => {
    const isKey    = KEY_WAYPOINT_INDICES.has(i);
    const isDone   = STAGES.some(s => (s.to === i || s.from === i) && completed.has(s.num));
    const isPartial = !isDone && STAGES.some(s => (s.to === i || s.from === i) && partials.has(s.num));
    markers[i].setIcon(makeMarkerIcon(isDone, isKey, isPartial));
  });

  // Sidebar items
  buildSidebar();

  // Progress bar
  const doneKm = STAGES.reduce((a, s) => {
    if (completed.has(s.num)) return a + s.km;
    const p = partials.get(s.num);
    if (p) return a + (p / 100 * s.km);
    return a;
  }, 0);
  const pct = TOTAL_KM > 0 ? (doneKm / TOTAL_KM * 100) : 0;
  document.getElementById('prog-pct').textContent = pct.toFixed(1) + '%';
  document.getElementById('prog-km').textContent  = `${doneKm.toFixed(1)} / ${TOTAL_KM.toFixed(1)} km`;
  document.getElementById('prog-bar').style.width = pct + '%';

  // Show completion badge if all stages are fully done
  if (completed.size === STAGES.length) {
    setTimeout(showCompletionBadge, 400);
  }
}

function resetAll() {
  if (!confirm(t('confirm.reset'))) return;
  completed.clear();
  partials.clear();
  saveState();
  refresh();
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  Object.assign(canvas.style, {
    position: 'fixed', top: 0, left: 0, width: '100%', height: '100%',
    pointerEvents: 'none', zIndex: 9999, display: 'none'
  });
  document.body.appendChild(canvas);

  const COLORS = ['#FF006E','#FB5607','#FFB703','#06D6A0','#3A86FF','#8338EC','#fff'];
  let particles = [], raf = null;

  function rand(a, b) { return Math.random() * (b - a) + a; }

  function spawn() {
    const count = 140;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: rand(0, canvas.width),
        y: rand(-canvas.height * 0.2, 0),
        r: rand(5, 11),
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: rand(-2.5, 2.5),
        vy: rand(3, 8),
        rot: rand(0, Math.PI * 2),
        vrot: rand(-0.15, 0.15),
        shape: Math.random() > 0.5 ? 'rect' : 'circle',
        w: rand(7, 14),
        h: rand(4, 8),
        alpha: 1,
      });
    }
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.r, p.r * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += 0.15;
      p.rot += p.vrot;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.03;
    });
    particles = particles.filter(p => p.alpha > 0);
    if (particles.length > 0) {
      raf = requestAnimationFrame(draw);
    } else {
      canvas.style.display = 'none';
    }
  }

  window.launchConfetti = function(duration) {
    duration = duration || 1000;
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    particles = [];
    if (raf) cancelAnimationFrame(raf);
    spawn();
    raf = requestAnimationFrame(draw);
    // Keep re-spawning for big bursts
    let elapsed = 0;
    const interval = 400;
    const spawnTimer = setInterval(() => {
      elapsed += interval;
      if (elapsed < duration) { spawn(); }
      else { clearInterval(spawnTimer); setTimeout(() => { particles = particles.slice(0, 30); }, 500); }
    }, interval);
  };
})();

// ─── COMPLETION BADGE ────────────────────────────────────────────────────────
(function() {
  const overlay = document.getElementById('completion-overlay');
  document.getElementById('completion-close').addEventListener('click', () => {
    overlay.classList.remove('open');
  });
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
  window.showCompletionBadge = function() {
    overlay.classList.add('open');
    launchConfetti(3000);
  };
})();


// ─── INIT ────────────────────────────────────────────────────────────────────
buildSidebar();
refresh();
applyTranslations();
trackProgress(); // snapshot current state on every page load
</script>
</body>
</html>
